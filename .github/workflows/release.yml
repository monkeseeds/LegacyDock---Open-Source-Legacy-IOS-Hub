name: LegacyDock Release Checks

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Syntax check
        run: npm run check

      - name: Test
        run: npm test

      - name: Generate source checksum
        shell: bash
        run: |
          git ls-files -z | xargs -0 sha256sum > legacydock-source.sha256

      - name: Upload verification artifact
        uses: actions/upload-artifact@v4
        with:
          name: legacydock-verification
          path: legacydock-source.sha256
