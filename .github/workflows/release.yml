name: LegacyDock Release Builds

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Syntax check
        run: npm run check

      - name: Test
        run: npm test

      - name: Generate source checksum
        shell: bash
        run: |
          git ls-files -z | xargs -0 sha256sum > legacydock-source.sha256

      - name: Upload verification artifact
        uses: actions/upload-artifact@v4
        with:
          name: legacydock-verification
          path: legacydock-source.sha256

  desktop:
    name: Desktop ${{ matrix.platform }}
    needs: verify
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows
            os: windows-latest
            build-script: desktop:build:windows
            artifact-name: LegacyDock-Windows
            artifact-path: src-tauri/target/release/bundle/**/*
          - platform: macos
            os: macos-latest
            build-script: desktop:build:macos
            artifact-name: LegacyDock-macOS
            artifact-path: src-tauri/target/release/bundle/**/*
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: desktop/package-lock.json

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install desktop dependencies
        run: npm --prefix desktop ci

      - name: Build desktop installer
        run: npm run ${{ matrix.build-script }}

      - name: Upload desktop installer
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact-name }}
          path: ${{ matrix.artifact-path }}
          if-no-files-found: error
