name: LegacyDock Windows Release Builds

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

env:
  APP_ENV: production
  UPDATE_ENDPOINT: https://updates.legacydock.com/latest.json

jobs:
  verify:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Syntax check
        run: npm run check

      - name: Test
        run: npm test

      - name: Generate source checksum
        shell: pwsh
        run: |
          git ls-files | ForEach-Object {
            $hash = (Get-FileHash -Algorithm SHA256 $_).Hash.ToLowerInvariant()
            "$hash  $_"
          } | Set-Content legacydock-source.sha256

      - name: Upload verification artifact
        uses: actions/upload-artifact@v4
        with:
          name: legacydock-verification
          path: legacydock-source.sha256

  windows-desktop:
    name: Windows Desktop Installer
    needs: verify
    runs-on: windows-latest
    env:
      APP_ENV: production
      UPDATE_ENDPOINT: https://updates.legacydock.com/latest.json
      TAURI_PUBLIC_KEY: ${{ secrets.TAURI_PUBLIC_KEY }}
      TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
      TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
      WINDOWS_CERTIFICATE: ${{ secrets.WINDOWS_CERTIFICATE }}
      WINDOWS_CERTIFICATE_PASSWORD: ${{ secrets.WINDOWS_CERTIFICATE_PASSWORD }}
      WINDOWS_CERTIFICATE_THUMBPRINT: ${{ secrets.WINDOWS_CERTIFICATE_THUMBPRINT }}
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: desktop/package-lock.json

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Document release secret status
        shell: pwsh
        run: |
          $names = @(
            "TAURI_PUBLIC_KEY",
            "TAURI_SIGNING_PRIVATE_KEY",
            "WINDOWS_CERTIFICATE",
            "WINDOWS_CERTIFICATE_THUMBPRINT",
            "SUPABASE_URL",
            "SUPABASE_ANON_KEY"
          )
          foreach ($name in $names) {
            if ([string]::IsNullOrWhiteSpace([Environment]::GetEnvironmentVariable($name))) {
              Write-Warning "$name is not configured. Build may be unsigned or cloud-disabled."
            } else {
              Write-Host "$name is configured."
            }
          }

      - name: Install desktop dependencies
        run: npm --prefix desktop ci

      - name: Build Windows installer
        run: npm run desktop:build:windows

      - name: Generate installer checksums
        shell: pwsh
        run: |
          Get-ChildItem src-tauri/target/release/bundle -Recurse -File |
            Where-Object { $_.Extension -in ".exe", ".msi" } |
            ForEach-Object {
              $hash = (Get-FileHash -Algorithm SHA256 $_.FullName).Hash.ToLowerInvariant()
              "$hash  $($_.FullName)"
            } | Set-Content legacydock-windows-installers.sha256

      - name: Upload Windows installers
        uses: actions/upload-artifact@v4
        with:
          name: LegacyDock-Windows
          path: |
            src-tauri/target/release/bundle/**/*.exe
            src-tauri/target/release/bundle/**/*.msi
            legacydock-windows-installers.sha256
          if-no-files-found: error
